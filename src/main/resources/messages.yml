player-messages:
  already-active: "<red>Unable to join. A game is already active. Please wait for it to finish before joining."
  joined-team: "<green>You have joined the <team>! The game will start soon. Get ready!"
  team-not-found: "<red>Team not found. Please choose a valid team."
  quit-broadcast: "<yellow><player> has left the game."
  quit: "<red>You have left the game. Thanks for playing!"
  already-in-team: "<red>You are already in a team!"
  game-started: "<green>The game has started! Capture the enemy's flag and return it to your base to score points. First team to <captures-to-win> captures wins!"
  out-of-time: "<red>Time's up! The game has ended. Thanks for playing!"
  cant-steal-own-flag: "<red>You can't steal your own team's flag!"
  already-carrying-flag: "<red>You are already carrying a flag! Return it to your flagpole before trying to steal another one."
  flag-already-stolen: "<red>The flag is already stolen! Wait for it to be returned before trying to steal it again."
  flag-stolen: "<yellow><player> has stolen the <team>'s flag!"
  flag-captured: "<green><player> has captured the <team>'s flag! <current-captures>/<captures-to-win> captures for the <team>."
  time-update: "<yellow>Time remaining: <time-remaining>. Current score:"
  score-update: "<yellow><team> team: <current-captures>/<captures-to-win> captures"
  game-ended-no-players-on-team: "<red>The game has ended because there are no players left on the <team>. Thanks for playing!"
  game-ended: "<green>The game has ended! The <team> team won the game! Thanks for playing!"
  no-game-active: "<red>No game is currently active. Join a team to start playing!"
  picked-up-dropped-flag: "<yellow><player> has picked up the dropped <team>'s flag!"
  dropped-flag: "<yellow><player> has dropped the <team>'s flag!"
  returned-flag: "<yellow><player> has returned the <team>'s flag to their base!"

admin-messages:
  already-active: "<red>A game is already active. Please wait for it to finish before attempting to do that again."
  join-first: "<red>You need to be in a team to do that. Join a game first!"
  not-all-flags-set: "<red>Not all flags are set. Please set all flags before starting the game."
  removed-existing-flag: "<yellow>Removed existing flag for <team>."
  need-players: "<red>Not enough players to start the game. At least 2 players, one on each team, are required."
  set-flag: "<green>You have set the flag for the <team> at your current location."
  game-started: "<green>You have started the game!"